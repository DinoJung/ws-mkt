<div style="max-width: 600px; margin: 0 auto; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif; color: #333333; line-height: 1.6; padding: 24px; background-color: #ffffff; border: 1px solid #eaeaea; border-radius: 8px; box-sizing: border-box;">
<div style="text-align: center; margin-bottom: 32px;">
        <h1 style="margin: 0 0 12px 0; font-size: 24px; color: #111111; font-weight: 700;">
            {{ title }}
        </h1>
        {% if description %}
        <p style="margin: 0; font-size: 16px; color: #666666;">
            {{ description }}
        </p>
        {% endif %}
    </div>

<div style="margin-bottom: 32px; padding: 20px; background-color: #f9f9f9; border-radius: 6px; border: 1px solid #eeeeee;">
        <h2 style="margin: 0 0 16px 0; font-size: 18px; color: #222222; border-bottom: 1px solid #dddddd; padding-bottom: 8px; font-weight: 600;">
            이벤트 안내
        </h2>
        <div style="margin-bottom: 16px;">
            <strong style="color: #444444; font-size: 15px;">이벤트 기간</strong>
            <span style="display: block; margin-top: 4px; color: #333333; font-size: 15px;">
                {{ event_period }}
            </span>
        </div>
        <div>
            <strong style="color: #444444; font-size: 15px;">포인트 사용기한</strong>
            <span style="display: block; margin-top: 4px; color: #333333; font-size: 15px;">
                {{ point_usage_deadline }}
            </span>
        </div>
    </div>

<div style="margin-bottom: 32px;">
        <h2 style="margin: 0 0 12px 0; font-size: 18px; color: #222222; font-weight: 600;">
            유의사항
        </h2>
        <ul style="margin: 0; padding-left: 24px; color: #555555; font-size: 14px;">
            {{ notices_list_items }}
        </ul>
    </div>

{% if cta_link and cta_text %}
    <div style="text-align: center; margin-top: 40px; margin-bottom: 16px;">
        <a href="{{ cta_link }}" target="_blank" rel="noopener noreferrer" style="display: inline-block; padding: 14px 28px; background-color: #007bff; color: #ffffff; text-decoration: none; font-weight: 600; border-radius: 6px; font-size: 16px;">
            {{ cta_text }}
        </a>
    </div>
    {% endif %}
</div>
